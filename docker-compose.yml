version: '3.8'

services:
  app:
    build: .
    container_name: syncsentinel
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - db
    networks:
      - syncsentinel-net

  db:
    image: postgres:15-alpine
    container_name: syncsentinel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-db_metrics}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - syncsentinel-net

networks:
  syncsentinel-net:
    driver: bridge

volumes:
  postgres_data:
