version: '3.8'

services:
  app:
    build: .
    container_name: syncsentinel
    restart: unless-stopped
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - MONITOR_START_TIME=${MONITOR_START_TIME}
      - MONITOR_END_TIME=${MONITOR_END_TIME}
      - CHECK_INTERVAL_SECONDS=${CHECK_INTERVAL_SECONDS}
      - MSSQL_USER=${MSSQL_USER}
      - MSSQL_PASS=${MSSQL_PASS}
      - HOST_GAINS=${HOST_GAINS}
      - HOST_REPLICA=${HOST_REPLICA}
      - HOST_EPICOR=${HOST_EPICOR}
      - HOST_CL=${HOST_CL}
      - MSSQL_DB_GAINS=${MSSQL_DB_GAINS}
      - MSSQL_DB_REPLICA=${MSSQL_DB_REPLICA}
      - MSSQL_DB_EPICOR=${MSSQL_DB_EPICOR}
      - MSSQL_DB_CL=${MSSQL_DB_CL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_SCHEMA=${POSTGRES_SCHEMA}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - LOG_ERROR_FILE=${LOG_ERROR_FILE}
      - START_DATE_DAYS_BACK=${START_DATE_DAYS_BACK}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - db
    networks:
      - syncsentinel-net

  db:
    image: postgres:15-alpine
    container_name: syncsentinel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-db_metrics}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - syncsentinel-net

networks:
  syncsentinel-net:
    driver: bridge

volumes:
  postgres_data:
